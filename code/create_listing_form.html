</div>
<!-- Category & Duration Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="category">Category</label>
<div class="relative">
<select class="w-full border border-outline-variant rounded px-3 py-2 font-body-md text-body-md bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary text-on-surface appearance-none pr-10" id="category">
<option disabled="" selected="" value="">Select category</option>
<option value="engineering">Engineering</option>
<option value="data-science">Data Science</option>
<option value="business">Business &amp; Finance</option>
<option value="design">Design &amp; UX</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="duration">Duration</label>

<select class="w-full border border-outline-variant rounded px-3 py-2 font-body-md text-body-md bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary text-on-surface appearance-none pr-10" id="duration">
<option disabled="" selected="" value="">Select duration</option>
<option value="3-months">3 Months</option>
<option value="6-months">6 Months</option>
<option value="12-months">12 Months</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
</div>

<button class="p-1 text-on-surface-variant hover:bg-surface-variant rounded" type="button"><span class="material-symbols-outlined text-[18px]">format_italic</span></button>
<button class="p-1 text-on-surface-variant hover:bg-surface-variant rounded" type="button"><span class="material-symbols-outlined text-[18px]">format_list_bulleted</span></button>

</span>

</span>
